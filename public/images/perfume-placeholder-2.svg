<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="glass2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4d8dc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8bec4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquid2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4a3728;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:0.85" />
    </linearGradient>
  </defs>
  <!-- Oval cap -->
  <ellipse cx="100" cy="35" rx="35" ry="18" fill="#1a1a1a"/>
  <rect x="70" y="20" width="60" height="35" rx="8" fill="#2c2c2c"/>
  <!-- Neck -->
  <rect x="78" y="55" width="44" height="60" rx="4" fill="url(#glass2)" stroke="#aaa" stroke-width="1"/>
  <rect x="80" y="75" width="40" height="40" fill="url(#liquid2)" rx="2"/>
  <!-- Rounded body -->
  <path d="M55 115 Q55 270 100 275 Q145 270 145 115 Q145 100 100 100 Q55 100 55 115Z" 
        fill="url(#glass2)" stroke="#aaa" stroke-width="1"/>
  <path d="M60 120 Q60 265 100 268 Q140 265 140 120 Q140 108 100 108 Q60 108 60 120Z" 
        fill="url(#liquid2)" opacity="0.88"/>
</svg>
