<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <defs>
    <linearGradient id="glass1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4e1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f3f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4cfc9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#D2691E;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Cap -->
  <rect x="75" y="20" width="50" height="40" rx="5" fill="#2c2c2c"/>
  <rect x="85" y="5" width="30" height="25" rx="3" fill="#1a1a1a"/>
  <!-- Bottle neck -->
  <rect x="82" y="60" width="36" height="50" fill="url(#glass1)" stroke="#ccc" stroke-width="1"/>
  <!-- Liquid -->
  <rect x="84" y="85" width="32" height="25" fill="url(#liquid1)" rx="1"/>
  <!-- Bottle body -->
  <path d="M65 110 L65 260 Q65 280 100 280 Q135 280 135 260 L135 110 Q135 95 100 95 Q65 95 65 110Z" 
        fill="url(#glass1)" stroke="#ccc" stroke-width="1"/>
  <path d="M68 115 L68 255 Q68 272 100 272 Q132 272 132 255 L132 115 Q132 102 100 102 Q68 102 68 115Z" 
        fill="url(#liquid1)" opacity="0.85"/>
</svg>
